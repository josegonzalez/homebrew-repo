name: Test Formula Installation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  list-formulas:
    runs-on: ubuntu-latest
    outputs:
      formulas: ${{ steps.list.outputs.formulas }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List formulas
        id: list
        run: |
          formulas=$(ls Formula/*.rb | xargs -n1 basename | sed 's/\.rb$//' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "formulas=$formulas" >> "$GITHUB_OUTPUT"

  test-formulas:
    needs: list-formulas
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        formula: ${{ fromJson(needs.list-formulas.outputs.formulas) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up local tap
        run: |
          mkdir -p "$(brew --repository)/Library/Taps/josegonzalez"
          ln -s "$GITHUB_WORKSPACE" "$(brew --repository)/Library/Taps/josegonzalez/homebrew-repo"

      - name: Install formula from tap
        run: brew install josegonzalez/repo/${{ matrix.formula }}

      - name: Verify installation
        run: brew list ${{ matrix.formula }}
